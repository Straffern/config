[package]
name = "waldl"
version = "0.1.0"
edition = "2024"
description = "Wallhaven wallpaper browser TUI"

[dependencies]
# TUI — pinned to 0.30 to match ratatui-image
ratatui = { version = "0.30", features = ["crossterm"] }
crossterm = { version = "0.29", features = ["event-stream"] }

# Image rendering in terminal
ratatui-image = { version = "10", default-features = false, features = [
    "image-defaults",
    "crossterm",
] }
image = "0.25"

# Async runtime
tokio = { version = "1", features = ["full"] }
futures = "0.3"

# HTTP
reqwest = { version = "0.12", features = ["json", "stream"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

# Paths
directories = "6"
dirs = "5"

# Errors
anyhow = "1"
thiserror = "2"

# Misc
md5 = "0.7"
chrono = "0.4"
shellexpand = "3"
libc = "0.2"

[profile.release]
lto = true
strip = true
codegen-units = 1
